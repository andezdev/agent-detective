version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
    open-pull-requests-limit: 10
    groups:
      astro-apps:
        patterns:
          - astro
          - "@astrojs/*"
          - astro-mermaid
          - mermaid
          - sharp
          - "@tailwindcss/*"
          - tailwindcss
      dev-tools:
        patterns:
          - "@commitlint/*"
          - husky
          - "@eslint/*"
          - tmp
          - pino
          - pino-pretty
          - prom-client
    ignore:
      # Catalog-managed deps: versions live in pnpm-workspace.yaml. Dependabot
      # inlines resolved versions into pnpm-lock.yaml specifiers and breaks
      # manifests that use "catalog:" (dependabot/dependabot-core#12244).
      - dependency-name: typescript
      - dependency-name: tsx
      - dependency-name: "@types/node"
      - dependency-name: zod
      - dependency-name: eslint
      - dependency-name: turbo
      - dependency-name: typescript-eslint
      - dependency-name: tsup
      - dependency-name: jira.js
      - dependency-name: "@linear/sdk"
      - dependency-name: marked
      - dependency-name: fastify
      - dependency-name: fastify-type-provider-zod
      - dependency-name: "@fastify/swagger"
      - dependency-name: "@scalar/fastify-api-reference"
      - dependency-name: openapi-types
      - dependency-name: "@agent-detective/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore
    labels:
      - dependencies
      - github-actions
